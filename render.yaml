services:
  - type: web
    name: poppk-er-review-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1/chat/completions
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LLM_API_KEY
        sync: false
